<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Writing Mission - Chris Wong</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // 模擬 Lucide 圖示組件
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // === 音效引擎 ===
        let globalAudioCtx = null;
        const playSound = (type, enabled) => {
            if (!enabled) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            if (!globalAudioCtx) globalAudioCtx = new AudioContext();
            if (globalAudioCtx.state === 'suspended') globalAudioCtx.resume();
            const ctx = globalAudioCtx;

            if (type === 'click') {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
            } else if (type === 'success') {
                [523.25, 659.25, 783.99].forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.type = 'triangle'; osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0, ctx.currentTime + (i * 0.1));
                    gain.gain.linearRampToValueAtTime(0.1, ctx.currentTime + 0.05 + (i * 0.1));
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5 + (i * 0.1));
                    osc.start(ctx.currentTime + (i * 0.1)); osc.stop(ctx.currentTime + 1 + (i * 0.1));
                });
            }
        };

        const App = () => {
            const [currentStep, setCurrentStep] = useState(0);
            const [soundEnabled, setSoundEnabled] = useState(true);
            const [draft, setDraft] = useState({
                step1_greeting: "Dear Kitty,\n\n",
                step1_opening: "",
                step2: "First, you said that ",
                step3: "Next, you said that ",
                step4: "Lastly, you said that ",
                step5: ""
            });

            // 這裡簡化了部分邏輯以確保單機版流暢度
            const handleNext = (step) => {
                playSound('success', soundEnabled);
                setCurrentStep(step);
                window.scrollTo(0,0);
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    {currentStep === 0 ? (
                        <div className="max-w-4xl mx-auto space-y-8 text-center">
                            <div className="bg-white rounded-3xl p-10 shadow-xl border border-slate-100">
                                <h1 className="text-4xl font-black text-indigo-600 mb-4">拯救 Kitty 的任務</h1>
                                <p className="text-slate-600 text-lg mb-8">你是 Chris Wong，請寫一封信建議 Kitty 如何處理她的煩惱。</p>
                                <button 
                                    onClick={() => handleNext(1)}
                                    className="bg-indigo-600 text-white px-10 py-4 rounded-2xl font-bold text-xl hover:bg-indigo-700 transition-all shadow-lg"
                                >
                                    開始任務
                                </button>
                            </div>
                        </div>
                    ) : (
                        <div className="max-w-2xl mx-auto bg-white p-8 rounded-3xl shadow-lg border border-slate-100">
                            <div className="flex justify-between items-center mb-6">
                                <button onClick={() => setCurrentStep(0)} className="text-slate-400 font-bold">← 返回</button>
                                <span className="bg-indigo-100 text-indigo-700 px-4 py-1 rounded-full font-bold text-sm">Step {currentStep} / 5</span>
                            </div>
                            <h2 className="text-2xl font-bold mb-4">正在編寫階段 {currentStep}...</h2>
                            <textarea 
                                className="w-full h-40 p-4 border-2 border-slate-200 rounded-xl mb-6 focus:border-indigo-500 outline-none"
                                value={currentStep === 1 ? draft.step1_opening : draft[`step${currentStep}`]}
                                onChange={(e) => {
                                    const key = currentStep === 1 ? 'step1_opening' : `step${currentStep}`;
                                    setDraft({...draft, [key]: e.target.value});
                                }}
                            />
                            <button 
                                onClick={() => currentStep < 5 ? handleNext(currentStep + 1) : alert('任務完成！內容已儲存。')}
                                className="w-full bg-slate-800 text-white py-4 rounded-xl font-bold text-lg"
                            >
                                {currentStep === 5 ? '完成所有步驟' : '下一步'}
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
